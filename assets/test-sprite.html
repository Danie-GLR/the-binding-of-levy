<!DOCTYPE html>
<html>
<head>
    <title>Sprite Test</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: monospace; padding: 20px; }
        img { border: 2px solid #ff4444; image-rendering: pixelated; }
        canvas { border: 2px solid #4444ff; margin: 10px; }
    </style>
</head>
<body>
    <h1>Isaac Sprite Sheet Test</h1>
    <h2>Direct Image Load:</h2>
    <img src="isaac-sprite.png" width="320" height="320">
    
    <h2>Canvas Test (First Frame):</h2>
    <canvas id="test" width="64" height="64"></canvas>
    
    <h2>Debug Info:</h2>
    <pre id="debug"></pre>
    
    <script>
        const img = new Image();
        const debug = document.getElementById('debug');
        
        img.onload = () => {
            debug.innerHTML += `✓ Image loaded successfully\n`;
            debug.innerHTML += `  Size: ${img.width}x${img.height}\n`;
            
            // Draw first frame to canvas
            const canvas = document.getElementById('test');
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(img, 0, 0, 32, 32, 0, 0, 64, 64);
            debug.innerHTML += `✓ First frame rendered to canvas\n`;
        };
        
        img.onerror = () => {
            debug.innerHTML += `✗ Failed to load image\n`;
        };
        
        img.src = 'isaac-sprite.png';
        debug.innerHTML = `Loading isaac-sprite.png...\n`;
    </script>
</body>
</html>
