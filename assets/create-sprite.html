<!DOCTYPE html>
<html>
<head>
    <title>Create Isaac Sprite Sheet</title>
</head>
<body>
    <h2>Isaac Sprite Sheet Creator</h2>
    <p>Creating a placeholder sprite sheet...</p>
    <canvas id="canvas" width="320" height="320"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Create a simple Isaac sprite sheet
        const frameSize = 32;
        const cols = 10;
        const rows = 10;
        
        // Background
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw frames
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const x = col * frameSize;
                const y = row * frameSize;
                
                // Draw Isaac head (beige/cream color)
                ctx.fillStyle = '#f5deb3';
                ctx.beginPath();
                ctx.arc(x + 16, y + 16, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 10, y + 12, 4, 4);
                ctx.fillRect(x + 18, y + 12, 4, 4);
                
                // Mouth
                ctx.fillRect(x + 12, y + 20, 8, 2);
                
                // Add slight variations for animation
                if (col % 2 === 0) {
                    // Blink or different expression
                    ctx.fillStyle = '#f5deb3';
                    ctx.fillRect(x + 10, y + 12, 4, 2);
                    ctx.fillRect(x + 18, y + 12, 4, 2);
                }
            }
        }
        
        // Download
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'isaac-sprite.png';
            a.click();
        });
    </script>
</body>
</html>
